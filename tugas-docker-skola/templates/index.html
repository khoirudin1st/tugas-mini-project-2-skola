<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>My ToDo List</h1>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Enter a task..." required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for todo in todos %}
            <li>{{ todo.task }}
                <a href="/delete/{{ todo.id }}" onclick="return confirm('Delete this task?')">❌</a>
            </li>
        {% else %}
            <li>No tasks yet!</li>
        {% endfor %}
    </ul>
</body>
</html>
